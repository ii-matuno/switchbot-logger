name: SwitchBot Logger

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分ごとに実行
  workflow_dispatch:          # 手動実行も可能

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: ライブラリをインストール
        run: pip install requests

      - name: ログを取得
        env:
          SWITCHBOT_TOKEN: ${{ secrets.SWITCHBOT_TOKEN }}
          SWITCHBOT_SECRET: ${{ secrets.SWITCHBOT_SECRET }}
        run: python logger.py

      - name: CSVをコミット
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add switchbot_log.csv
          git diff --staged --quiet || git commit -m "ログ更新: $(date +'%Y-%m-%d %H:%M')"
          git push
